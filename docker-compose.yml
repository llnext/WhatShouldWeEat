services:
  what-should-we-eat:
    image: ghcr.io/llnext/whatshouldweeat:latest
    container_name: what-should-we-eat
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:../data/database.sqlite"
      JWT_SECRET: "please-change-me"
      PORT: "3000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
